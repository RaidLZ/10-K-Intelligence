# Local infra for 10-K Intelligence: a vector store + a graph store.
# Ollama runs natively on the host (simpler GPU access) — install separately:
#   curl -fsSL https://ollama.com/install.sh | sh && ollama pull qwen2.5:3b-instruct
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST/gRPC
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt
    environment:
      # NEO4J_AUTH must match NEO4J_USER / NEO4J_PASSWORD in your .env
      NEO4J_AUTH: "neo4j/tenkpassword"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  qdrant_data:
  neo4j_data:
